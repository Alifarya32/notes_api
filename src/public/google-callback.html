<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Notes — Login Google</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card glass" style="text-align: center; padding: 2rem;">
    <span class="loading-spinner" aria-hidden="true"></span>
    <p style="margin-top: 1rem; color: var(--text-muted);">Menyelesaikan login Google...</p>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/session.js"></script>
  <script>
    function getApiBase() {
      return typeof getApiBaseUrl === 'function'
        ? getApiBaseUrl()
        : (window.API_CONFIG?.BASE_URL || window.location.origin).replace(/\/$/, '');
    }

    async function finishGoogleLogin() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const idToken = params.get('id_token');
      const error = params.get('error');

      if (error) {
        alert('Login Google dibatalkan: ' + error);
        window.location.href = 'index.html';
        return;
      }

      if (!idToken) {
        alert('Token Google tidak ditemukan. Coba mode alternatif atau nonaktifkan Brave Shields.');
        window.location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch(`${getApiBase()}/api/v1/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: idToken }),
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Login gagal');
        }

        saveSession(data.data);
        window.location.href = 'dashboard.html';
      } catch (err) {
        alert(err.message || 'Login Google gagal');
        window.location.href = 'index.html';
      }
    }

    finishGoogleLogin();
  </script>
</body>
</html>
