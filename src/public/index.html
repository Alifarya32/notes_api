<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notesa — Login/Register</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <main class="auth-page">
    <div class="auth-card glass">
      <div class="auth-card__brand">
        <h1 class="auth-card__title">Sign In</h1>
        <p class="auth-card__subtitle">Sign in to your account</p>
      </div>

      <form id="login-form" class="auth-form auth-form--active" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            class="form-input"
            placeholder="Masukkan email Anda"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            class="form-input"
            placeholder="Masukkan password Anda"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit">Masuk</button>

        <div class="auth-divider" aria-hidden="true"><span>atau</span></div>
        <div id="google-signin-btn" class="google-signin-wrap"></div>
      </form>

      <form id="register-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="register-name">Nama Lengkap</label>
          <input
            type="text"
            id="register-name"
            class="form-input"
            placeholder="John Doe"
            autocomplete="name"
            required
          />
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            class="form-input"
            placeholder="Masukkan email Anda"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input
            type="password"
            id="register-password"
            class="form-input"
            placeholder="Min. 8 karakter, huruf + angka"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary" id="register-submit">Daftar</button>
      </form>

      <p class="auth-toggle">
        <span id="toggle-text">Belum punya akun?</span>
        <button type="button" id="auth-toggle-btn">Daftar sekarang</button>
      </p>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
